name: full-sast-trivy-semgrep-sonarqube-defectdojo

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout code
      # -------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------
      # SEMGREP
      # -------------------------
      - name: Install Semgrep
        run: pip install --upgrade semgrep

      - name: Run Semgrep scan
        run: |
          semgrep --config=auto --json --output=semgrep.json
          ls -lah semgrep.json

      # -------------------------
      # TRIVY (FIXED)
      # -------------------------
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh

      - name: Run Trivy scan
        run: |
          ./bin/trivy fs --format json -o trivy.json .

      # -------------------------
      # SONARQUBE
      # -------------------------
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install SonarScanner
        run: |
          SCANNER_VERSION=5.0.1.3006
          curl -sSLo sonar.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SCANNER_VERSION}-linux.zip
          unzip sonar.zip
          mv sonar-scanner-${SCANNER_VERSION}-linux sonar-scanner
          echo "$(pwd)/sonar-scanner/bin" >> $GITHUB_PATH

      - name: Run SonarQube Scan
        env:
          SONAR_TOKEN: sqp_6b67a15f5759ead141800708c6516e63c0b3164d
        run: |
          sonar-scanner \
            -Dsonar.projectKey=my-project \
            -Dsonar.sources=. \
            -Dsonar.host.url=http://0f1dcdfc471c.mylabserver.com \
            -Dsonar.login=$SONAR_TOKEN

      - name: Export SonarQube Issues
        env:
          SONAR_TOKEN: sqp_6b67a15f5759ead141800708c6516e63c0b3164d
        run: |
          curl -u $SONAR_TOKEN: \
          "http://0f1dcdfc471c.mylabserver.com//api/issues/search?componentKeys=my-project&resolved=false" \
          -o sonar.json

      # -------------------------
      # SAFETY CHECK (IMPORTANT FIX FOR YOUR ERROR)
      # -------------------------
      - name: Verify files exist
        run: |
          test -f semgrep.json
          test -f trivy.json
          test -f sonar.json

      # -------------------------
      # DEFECTDOJO UPLOAD
      # -------------------------
      - name: Upload Semgrep
        run: |
          curl -X POST "$DEFECTDOJO_URL/api/v2/import-scan/" \
          -H "Authorization: Token $DEFECTDOJO_TOKEN" \
          -F "scan_type=Semgrep JSON Report" \
          -F "file=@semgrep.json" \
          -F "product_name=project_test" \
          -F "engagement_name=Semgrep Scan"

      - name: Upload Trivy
        run: |
          curl -X POST "$DEFECTDOJO_URL/api/v2/import-scan/" \
          -H "Authorization: Token $DEFECTDOJO_TOKEN" \
          -F "scan_type=Trivy Scan" \
          -F "file=@trivy.json" \
          -F "product_name=project_test" \
          -F "engagement_name=Trivy Scan"

      - name: Upload SonarQube
        run: |
          curl -X POST "$DEFECTDOJO_URL/api/v2/import-scan/" \
          -H "Authorization: Token $DEFECTDOJO_TOKEN" \
          -F "scan_type=SonarQube Scan" \
          -F "file=@sonar.json" \
          -F "product_name=project_test" \
          -F "engagement_name=SonarQube Scan"

    env:
      DEFECTDOJO_URL: http://0f1dcdfc471c.mylabserver.com:8080/
      DEFECTDOJO_TOKEN: 514b2ab012ed1f29d6b4f90c3d3218d95b4c58e1
