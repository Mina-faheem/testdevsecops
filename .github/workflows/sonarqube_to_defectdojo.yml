name: sonarqube-to-defectdojo

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sonar-scan:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # Install Java (required for SonarScanner)
      # -------------------------
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # -------------------------
      # Install SonarScanner
      # -------------------------
      - name: Install SonarScanner
        run: |
          curl -sSLo sonar.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar.zip
          echo "$PWD/sonar-scanner-*/bin" >> $GITHUB_PATH

      # -------------------------
      # Run SonarQube scan
      # -------------------------
      - name: Run SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=my-project \
            -Dsonar.sources=. \
            -Dsonar.host.url=${{ secrets.SONAR_URL }} \
            -Dsonar.login=$SONAR_TOKEN

      # -------------------------
      # Export report (simple JSON via API)
      # -------------------------
      - name: Get SonarQube Issues
        run: |
          curl -u ${{ secrets.SONAR_TOKEN }}: \
          "${{ secrets.SONAR_URL }}/api/issues/search?componentKeys=my-project" \
          -o sonar-report.json

      # -------------------------
      # Upload to DefectDojo
      # -------------------------
      - name: Upload to DefectDojo
        run: |
          pip install requests

          python3 <<EOF
          import requests, os

          base_url = os.getenv("DD_URL").rstrip("/")
          api_key = os.getenv("DD_API_KEY")
          engagement_id = os.getenv("DD_ENGAGEMENT_ID")

          headers = {"Authorization": f"Token {api_key}"}

          file_path = "sonar-report.json"

          with open(file_path, "rb") as f:
              files = {"file": f}
              data = {
                  "scan_type": "SonarQube Scan",
                  "engagement": engagement_id,
                  "active": "true",
                  "verified": "false"
              }

              r = requests.post(
                  f"{base_url}/api/v2/import-scan/",
                  headers=headers,
                  files=files,
                  data=data
              )

              print("Status:", r.status_code)
              print(r.text)
          EOF

        env:
          DD_API_KEY: 28d505b073684c295589b6d6dfbe7b48f3195380
          DD_URL: "http://0f1dcdfc473c.mylabserver.com:8080"
          DD_ENGAGEMENT_ID: "2"

      # -------------------------
      # Upload artifacts
      # -------------------------
      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-report
          path: sonar-report.json
