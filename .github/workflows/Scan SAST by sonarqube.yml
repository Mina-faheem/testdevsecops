
name: sonarqube-to-defectdojo

on:
  push:
    branches:
      - main

jobs:
  sonar-security-scan:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------
      # 1. Checkout source code
      # -------------------------------------------------
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------------------------
      # 2. Setup Java (required for SonarScanner)
      # -------------------------------------------------
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # -------------------------------------------------
      # 3. Install SonarScanner CLI
      # -------------------------------------------------
      - name: Install SonarScanner
        run: |
          SCANNER_VERSION=5.0.1.3006
          curl -sSLo sonar-scanner.zip \
            https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SCANNER_VERSION}-linux.zip
          unzip sonar-scanner.zip
          mv sonar-scanner-${SCANNER_VERSION}-linux sonar-scanner
          echo "$(pwd)/sonar-scanner/bin" >> $GITHUB_PATH

      - name: Verify SonarScanner
        run: sonar-scanner -v

      # -------------------------------------------------
      # 4. Run SonarQube Analysis
      # -------------------------------------------------
      - name: Run SonarQube Scan
        env:
          SONAR_TOKEN: sqp_aa4a3fee3804257139d76ba11457221460de81cc
          SONAR_URL: http://0f1dcdfc471c.mylabserver.com/
        run: |
          sonar-scanner \
            -Dsonar.projectKey=my-project \
            -Dsonar.sources=. \
            -Dsonar.host.url=$SONAR_URL \
            -Dsonar.login=$SONAR_TOKEN

      # -------------------------------------------------
      # 5. Enforce Quality Gate (BLOCKING STEP)
      # -------------------------------------------------
      - name: Check SonarQube Quality Gate
        env:
          SONAR_TOKEN: sqp_aa4a3fee3804257139d76ba11457221460de81cc
          SONAR_URL: http://0f1dcdfc471c.mylabserver.com/
        run: |
          echo "Waiting for SonarQube to compute Quality Gate..."
          sleep 10

          STATUS=$(curl -s -u $SONAR_TOKEN: \
            "$SONAR_URL/api/qualitygates/project_status?projectKey=my-project" \
            | jq -r '.projectStatus.status')

          echo "Quality Gate Status: $STATUS"

          if [ "$STATUS" != "OK" ]; then
            echo "❌ Quality Gate FAILED – stopping pipeline"
            exit 1
          fi

          echo "✅ Quality Gate PASSED"

      # -------------------------------------------------
      # 6. Export SonarQube Issues
      # -------------------------------------------------
      - name: Export SonarQube Issues
        env:
          SONAR_TOKEN: sqp_aa4a3fee3804257139d76ba11457221460de81cc
          SONAR_URL: http://0f1dcdfc471c.mylabserver.com/
        run: |
          curl -s -u $SONAR_TOKEN: \
          "$SONAR_URL/api/issues/search?componentKeys=my-project&resolved=false&ps=500" \
          -o sonar-report.json

      # -------------------------------------------------
      # 7. Upload Results to DefectDojo
      # -------------------------------------------------
      - name: Upload to DefectDojo
        env:
          DD_API_KEY: 28d505b073684c295589b6d6dfbe7b48f3195380
          DD_URL: "http://0f1dcdfc473c.mylabserver.com:8080"
          DD_ENGAGEMENT_ID: 2
        run: |
          pip install --quiet requests

          python3 <<EOF
          import requests, os

          url = os.environ["DD_URL"].rstrip("/") + "/api/v2/import-scan/"
          headers = {"Authorization": f"Token {os.environ['DD_API_KEY']}"}

          files = {"file": open("sonar-report.json", "rb")}
          data = {
              "scan_type": "SonarQube Scan",
              "engagement": os.environ["DD_ENGAGEMENT_ID"],
              "active": "true",
              "verified": "false"
          }

          response = requests.post(url, headers=headers, files=files, data=data)

          print("DefectDojo response code:", response.status_code)
          print(response.text)
          EOF

      # -------------------------------------------------
      # 8. Upload Artifact (for audit & debugging)
      # -------------------------------------------------
      - name: Upload SonarQube Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-report
          path: sonar-report.json
``
