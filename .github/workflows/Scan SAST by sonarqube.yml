
name: sonarqube-to-defectdojo

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  sonar-scan:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------
      # 1. Checkout source code
      # -------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------------------------
      # 2. Setup Java (required by SonarScanner)
      # -------------------------------------------------
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # -------------------------------------------------
      # 3. Install SonarScanner CLI
      # -------------------------------------------------
      - name: Install SonarScanner
        run: |
          SCANNER_VERSION=5.0.1.3006
          curl -sSLo sonar-scanner.zip \
          https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SCANNER_VERSION}-linux.zip
          unzip sonar-scanner.zip
          mv sonar-scanner-${SCANNER_VERSION}-linux sonar-scanner
          echo "$(pwd)/sonar-scanner/bin" >> $GITHUB_PATH

      # -------------------------------------------------
      # 4. Run SonarQube Analysis (Signal Only)
      # -------------------------------------------------
      - name: Run SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_URL: ${{ secrets.SONAR_URL }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=my-project \
            -Dsonar.host.url=$SONAR_URL \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.sources=. \
            -Dsonar.exclusions=**/.git/**,**/.scannerwork/**,**/node_modules/**,**/dist/**,**/build/** \
            -Dsonar.sourceEncoding=UTF-8

      # -------------------------------------------------
      # 5. Export SonarQube Issues (for DefectDojo)
      # -------------------------------------------------
      - name: Export SonarQube Issues
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_URL: ${{ secrets.SONAR_URL }}
        run: |
          curl -s -u $SONAR_TOKEN: \
          "$SONAR_URL/api/issues/search?componentKeys=my-project&resolved=false&ps=500" \
          -o sonar-report.json

      # -------------------------------------------------
      # 6. Upload Results to DefectDojo
      # -------------------------------------------------
      - name: Upload to DefectDojo
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_URL: ${{ secrets.DD_URL }}
          DD_ENGAGEMENT_ID: ${{ secrets.DD_ENGAGEMENT_ID }}
        run: |
          pip install --quiet requests

          python3 <<EOF
          import requests, os

          url = os.environ["DD_URL"].rstrip("/") + "/api/v2/import-scan/"
          headers = {"Authorization": f"Token {os.environ['DD_API_KEY']}"}

          files = {"file": open("sonar-report.json", "rb")}
          data = {
              "scan_type": "SonarQube Scan",
              "engagement": os.environ["DD_ENGAGEMENT_ID"],
              "active": "true",
              "verified": "false"
          }

          r = requests.post(url, headers=headers, files=files, data=data)
          print("DefectDojo response:", r.status_code)
          print(r.text)
          EOF

      # -------------------------------------------------
      # 7. Upload Artifact (Audit / Debug)
      # -------------------------------------------------
      - name: Upload SonarQube Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-report
          path: sonar-report.json
