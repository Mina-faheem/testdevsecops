
name: sonarqube-to-defectdojo

on:
  push:
    branches:
      - main

jobs:
  sonar-security-scan:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------
      # 1. Checkout source
      # -------------------------------------------------
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------------------------
      # 2. Setup Java
      # -------------------------------------------------
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # -------------------------------------------------
      # 3. Install SonarScanner
      # -------------------------------------------------
      - name: Install SonarScanner
        run: |
          SCANNER_VERSION=5.0.1.3006
          curl -sSLo sonar-scanner.zip \
            https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SCANNER_VERSION}-linux.zip
          unzip sonar-scanner.zip
          mv sonar-scanner-${SCANNER_VERSION}-linux sonar-scanner
          echo "$(pwd)/sonar-scanner/bin" >> $GITHUB_PATH

      # -------------------------------------------------
      # 4. Install jq
      # -------------------------------------------------
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # -------------------------------------------------
      # 5. Run SonarQube Analysis (✅ CORRECT for your repo)
      # -------------------------------------------------
      - name: Run SonarQube Scan
        env:
          SONAR_TOKEN: sqp_aa4a3fee3804257139d76ba11457221460de81cc
          SONAR_URL: http://0f1dcdfc471c.mylabserver.com
        run: |
          sonar-scanner \
            -Dsonar.projectKey=my-project \
            -Dsonar.host.url=$SONAR_URL \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.sources=. \
            -Dsonar.exclusions=**/.git/**,**/.scannerwork/**,**/node_modules/**,**/dist/**,**/build/**,**/*.zip,**/*.jar \
            -Dsonar.sourceEncoding=UTF-8

      # -------------------------------------------------
      # 6. Wait for Compute Engine + Quality Gate
      # -------------------------------------------------
      - name: Check SonarQube Quality Gate
        env:
          SONAR_TOKEN: sqp_aa4a3fee3804257139d76ba11457221460de81cc
        run: |
          REPORT_FILE=".scannerwork/report-task.txt"

          if [ ! -f "$REPORT_FILE" ]; then
            echo "❌ report-task.txt not found"
            exit 1
          fi

          CE_TASK_ID=$(grep ceTaskId $REPORT_FILE | cut -d'=' -f2)
          SERVER_URL=$(grep serverUrl $REPORT_FILE | cut -d'=' -f2)

          echo "Compute Engine Task ID: $CE_TASK_ID"

          for i in {1..30}; do
            STATUS=$(curl -s -u $SONAR_TOKEN: \
              "$SERVER_URL/api/ce/task?id=$CE_TASK_ID" | jq -r '.task.status')

            echo "Compute Engine status: $STATUS"

            if [ "$STATUS" = "SUCCESS" ]; then
              break
            fi

            if [ "$STATUS" = "FAILED" ]; then
              echo "❌ SonarQube Compute Engine FAILED"
              exit 1
            fi

            sleep 5
          done

          QG_STATUS=$(curl -s -u $SONAR_TOKEN: \
            "$SERVER_URL/api/qualitygates/project_status?projectKey=my-project" \
            | jq -r '.projectStatus.status')

          echo "Quality Gate Status: $QG_STATUS"

          if [ "$QG_STATUS" != "OK" ]; then
            echo "❌ Quality Gate FAILED"
            exit 1
          fi

          echo "✅ Quality Gate PASSED"

      # -------------------------------------------------
      # 7. Export SonarQube Issues
      # -------------------------------------------------
      - name: Export SonarQube Issues
        env:
          SONAR_TOKEN: sqp_aa4a3fee3804257139d76ba11457221460de81cc
          SONAR_URL: http://0f1dcdfc471c.mylabserver.com
        run: |
          curl -s -u $SONAR_TOKEN: \
          "$SONAR_URL/api/issues/search?componentKeys=my-project&resolved=false&ps=500" \
          -o sonar-report.json

      # -------------------------------------------------
      # 8. Upload to DefectDojo
      # -------------------------------------------------
      - name: Upload to DefectDojo
        env:
          DD_API_KEY: 28d505b073684c295589b6d6dfbe7b48f3195380
          DD_URL: http://0f1dcdfc473c.mylabserver.com:8080
          DD_ENGAGEMENT_ID: "2"
        run: |
          pip install --quiet requests

          python3 <<EOF
          import requests, os

          url = os.environ["DD_URL"].rstrip("/") + "/api/v2/import-scan/"
          headers = {"Authorization": f"Token {os.environ['DD_API_KEY']}"}

          files = {"file": open("sonar-report.json", "rb")}
          data = {
              "scan_type": "SonarQube Scan",
              "engagement": os.environ["DD_ENGAGEMENT_ID"],
              "active": "true",
              "verified": "false"
          }

          r = requests.post(url, headers=headers, files=files, data=data)
          print("DefectDojo status:", r.status_code)
          print(r.text)
          EOF

      # -------------------------------------------------
      # 9. Upload artifact
      # -------------------------------------------------
      - name: Upload SonarQube Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-report
          path: sonar-report.json
